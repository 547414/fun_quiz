<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"></stop>
      <stop offset="100%" stop-color="#8b5cf6"></stop>
    </linearGradient>

    <!-- 发光流动线性渐变 -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="transparent"></stop>
      <stop offset="50%" stop-color="white" stop-opacity="0.3"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </linearGradient>

    <!-- 遮罩用于光斑 -->
    <mask id="shineMask">
      <rect x="-48" y="-48" width="96" height="96" fill="url(#shineGradient)">
        <animateTransform attributeName="transform" type="translate" from="-48 -48" to="96 96" dur="3s" repeatCount="indefinite"></animateTransform>
      </rect>
    </mask>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="0" y="0" width="48" height="48" rx="14" fill="url(#bgGradient)"></rect>

  <!-- 流光动画遮罩层 -->
  <rect x="0" y="0" width="48" height="48" rx="14" fill="white" mask="url(#shineMask)"></rect>

  <!-- Fluent cube 图标 -->
  <g transform="translate(8, 8) scale(1.33)">
    <path fill="#ffffff" d="M13.409 2.511a3.75 3.75 0 0 0-2.818 0l-7.498 3.04A1.75 1.75 0 0 0 2 7.173v9.653a1.75 1.75 0 0 0 1.093 1.621l7.498 3.04a3.75 3.75 0 0 0 2.818 0l7.498-3.04A1.75 1.75 0 0 0 22 16.826V7.173a1.75 1.75 0 0 0-1.093-1.622zm-7.36 5.472a.75.75 0 0 1 .967-.435L12 9.438l4.984-1.89a.75.75 0 1 1 .532 1.402l-4.766 1.81v5.49a.75.75 0 1 1-1.5 0v-5.49L6.484 8.95a.75.75 0 0 1-.435-.967"></path>
  </g>
</svg>
